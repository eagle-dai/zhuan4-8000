<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>样卡预览 · exhaust ①</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif;
         background: #f2f2f7; margin: 0; padding: 24px; }
  @media (prefers-color-scheme: dark) { body { background: #1c1c1e; } }
  .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 28px 24px; text-align: center;
          box-shadow: 0 2px 12px rgba(0,0,0,.08); color: #1c1c1e; }
  @media (prefers-color-scheme: dark) { .card { background: #2c2c2e; color: #f2f2f7; } }
  .label { font-size: 12px; letter-spacing: .08em; color: #8e8e93; text-transform: uppercase; margin-bottom: 14px; }
  .word { font-size: 40px; font-weight: 700; }
  .phon { font-size: 20px; color: #8e8e93; margin-top: 6px; font-style: italic; }
  .pos { color: #ff9500; font-weight: 700; margin-right: 6px; }
  .def-zh { font-size: 26px; font-weight: 600; margin: 4px 0 20px; }
  .ex { font-size: 19px; line-height: 1.5; }
  .ex-zh { font-size: 16px; color: #8e8e93; margin-top: 8px; }
  hr { border: none; border-top: 1px solid #e5e5ea; margin: 20px 0; }
  @media (prefers-color-scheme: dark) { hr { border-top-color: #3a3a3c; } }
  .spk { cursor: pointer; background: #007aff; color: #fff; border: none; border-radius: 20px;
         padding: 8px 18px; font-size: 15px; margin-top: 16px; }
  .hint { font-size: 12px; color: #8e8e93; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 正面：单词 + 音标 + 读音 -->
  <div class="card">
    <div class="label">正面 Front</div>
    <div class="word">exhaust</div>
    <div class="phon">/ɪɡˈzɔːst/</div>
    <button class="spk" onclick="say('exhaust')">🔊 读单词</button>
  </div>

  <!-- 背面：释义 + 例句 + 例句读音 -->
  <div class="card">
    <div class="label">背面 Back</div>
    <div class="word">exhaust</div>
    <div class="phon">/ɪɡˈzɔːst/</div>
    <hr>
    <div class="def-zh"><span class="pos">vt.</span>使筋疲力尽</div>
    <div class="ex"><em>We are all exhausted after a long cycle ride.</em></div>
    <div class="ex-zh">长途骑车后我们都筋疲力尽了。</div>
    <button class="spk" onclick="say('We are all exhausted after a long cycle ride.')">🔊 读例句</button>
  </div>

  <div class="hint">
    此 HTML 用浏览器 Web Speech 模拟 Anki 的 {{tts}} 读音。<br>
    真卡在 Anki 里用 <code>{{tts en_US:Word}}</code> / <code>{{tts en_US:Example}}</code>，自动朗读。
  </div>

</div>
<script>
function say(text) {
  if (!window.speechSynthesis) { alert('浏览器不支持语音'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.95;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
</script>
</body>
</html>
